<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-labelledby="title desc">
  <title id="title">NovaPrint Brasil</title>
  <desc id="desc">Logo NovaPrint Brasil com fundo transparente.</desc>
  <defs>
    <filter id="whiteGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.75"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#whiteGlow)">
    <polygon points="185,245 245,185 335,185 395,245 395,335 335,395 245,395 185,335" fill="#000000" stroke="#000000" stroke-width="7"/>
    <polygon points="65,365 125,305 215,305 275,365 275,455 215,515 125,515 65,455" fill="#f5008f" stroke="#000000" stroke-width="7"/>
    <polygon points="190,490 250,430 340,430 400,490 400,580 340,640 250,640 190,580" fill="#18aee5" stroke="#000000" stroke-width="7"/>
    <polygon points="330,360 390,300 480,300 540,360 540,450 480,510 390,510 330,450" fill="#ffe500" stroke="#000000" stroke-width="7"/>
    <text x="320" y="485" font-family="Arial, Helvetica, sans-serif" font-size="118" font-weight="700" fill="#000000" stroke="#ffffff" stroke-width="5" paint-order="stroke">NOVA</text>
    <text x="320" y="590" font-family="Arial, Helvetica, sans-serif" font-size="118" font-weight="700" fill="#000000" stroke="#ffffff" stroke-width="5" paint-order="stroke">PRINT</text>
    <text x="545" y="660" font-family="Arial, Helvetica, sans-serif" font-size="66" font-weight="400" text-anchor="end" fill="#000000" stroke="#ffffff" stroke-width="3" paint-order="stroke">Brasil</text>
  </g>
</svg>